<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #0b0b2b, #1b2735 70%, #090a0f);
  overflow: hidden;
}

.container {
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 30px;
  width: 320px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
  color: #fff;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

#result {
  margin-top: 15px;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
}

/* Stars */
.stars {
  width: 1px;
  height: 1px;
  position: absolute;
  background: white;
  box-shadow: 10vw 10vh white, 20vw 30vh white, 40vw 50vh white,
              60vw 20vh white, 80vw 70vh white;
  animation: twinkle 5s infinite;
}

@keyframes twinkle {
  0%,100% {opacity: 0.8;}
  50% {opacity: 0.3;}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h2>📊 Attendance Calculator</h2>

  <input type="number" id="total" placeholder="Total Lectures">
  <input type="number" id="attended" placeholder="Lectures Attended">
  <input type="number" id="required" placeholder="Required % (75)">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>
</div>

<script>
function calculate() {

  var T = Number(document.getElementById("total").value);
  var A = Number(document.getElementById("attended").value);
  var P = Number(document.getElementById("required").value);

  var result = document.getElementById("result");

  if (T <= 0 || A < 0 || P <= 0) {
    result.innerHTML = "⚠️ Enter valid values!";
    return;
  }

  var current = (A / T) * 100;
  var message = "";

  if (current >= P) {
    message = "😎 You are safe!";
  } else {

    // Max possible attendance if you attend all remaining classes
    var maxPossible = ((A + (T - A)) / (T + (T - A))) * 100;

    if (maxPossible < P) {
      message = "😔 You can't reach the required attendance. Better luck next time!";
    } else {
      var extra = 0;

      while ((A / T) * 100 < P) {
        A++;
        T++;
        extra++;
      }

      message = "📚 Attend " + extra + " more lectures.";
    }
  }

  result.innerHTML =
    "Current: " + current.toFixed(2) + "%<br>" + message;
}
</script>

</body>
</html>
