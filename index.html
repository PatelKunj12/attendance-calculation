<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Calculator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #0b0b2b, #1b2735 70%, #090a0f);

  padding: 15px;
  overflow-x: hidden;
}
/* Glassmorphism Card */
.container {
  width: 100%;
  max-width: 95%;  /* bigger on large screens */
  padding: 25px;
  border-radius: 15px;
  text-align: center;

  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);

  margin: 10px; /* space from edges on mobile */
}

h2 {
  color: #fff;
  margin-bottom: 20px;
  font-weight: 600;
}

/* Inputs */
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 14px;
}

input::placeholder {
  color: #ccc;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,255,255,0.6);
}

/* Result Box */
#result {
  margin-top: 15px;
  font-size: 14px;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
}

/* Fade Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Stars Background */
.stars {
  width: 1px;
  height: 1px;
  position: absolute;
  background: white;
  box-shadow: 2vw 5vh 2px white, 10vw 8vh 2px white, 20vw 15vh 1px white,
              30vw 25vh 2px white, 40vw 10vh 1px white, 50vw 30vh 2px white,
              60vw 20vh 1px white, 70vw 40vh 2px white, 80vw 15vh 1px white,
              90vw 35vh 2px white;
  animation: twinkle 6s infinite linear;
}

@keyframes twinkle {
  0%,100% {opacity: 0.8;}
  50% {opacity: 0.3;}
}

/* Shooting Stars */
.shooting-star {
  position: absolute;
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, white, transparent);
  animation: shoot 3s infinite ease-in;
}

.shooting-star:nth-child(1) { top: 20%; left: -100px; }
.shooting-star:nth-child(2) { top: 40%; left: -100px; animation-delay: 1s; }
.shooting-star:nth-child(3) { top: 60%; left: -100px; animation-delay: 2s; }

@keyframes shoot {
  0% {
    transform: translateX(0) rotate(25deg);
    opacity: 1;
  }
  100% {
    transform: translateX(120vw) translateY(50vh) rotate(25deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="container">
  <h2>📊 Attendance Calculator</h2>

  <input type="number" id="total" placeholder="Total Lectures">
  <input type="number" id="attended" placeholder="Lectures Attended">
  <input type="number" id="required" placeholder="Required % (75)">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>
</div>

<script>
function calculate() {

  var T = Number(document.getElementById("total").value);
  var A = Number(document.getElementById("attended").value);
  var P = Number(document.getElementById("required").value);

  var result = document.getElementById("result");

  if (T <= 0 || A < 0 || P <= 0) {
    result.innerHTML = "⚠️ Enter valid values!";
    return;
  }

  var current = (A / T) * 100;
  var message = "";

  if (current >= P) {
    message = "😎 You are safe!";
  } else {
    var extra = 0;

    while ((A / T) * 100 < P) {
      A++;
      T++;
      extra++;
    } else {

    message = "📚 Attend " + extra + " more lectures.";
  }

  result.innerHTML =
    "Current: " + current.toFixed(2) + "%<br>" + message;
}
</script>

</body>
</html>
