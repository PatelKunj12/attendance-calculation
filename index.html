<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #0b0b2b, #1b2735 70%, #090a0f);
  padding: 15px;
  overflow-x: hidden;
}

/* Responsive Container */
.container {
  width: 100%;
  max-width: 400px;
  padding: 25px;
  border-radius: 15px;
  text-align: center;

  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
  color: #fff;
  margin-bottom: 20px;
  font-size: clamp(18px, 2.5vw, 24px);
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 14px;
}

input::placeholder {
  color: #ccc;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  font-size: 15px;
}

button:hover {
  transform: scale(1.03);
}

/* Result */
#result {
  margin-top: 15px;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  font-size: 14px;
}

/* Stars stay same */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;

  background: transparent;
}

.stars::before {
  content: "";
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  box-shadow:
    5vw 10vh white, 15vw 20vh white, 25vw 30vh white,
    35vw 40vh white, 45vw 50vh white, 55vw 60vh white,
    65vw 70vh white, 75vw 80vh white, 85vw 30vh white,
    95vw 60vh white, 10vw 80vh white, 20vw 90vh white;
  animation: twinkle 5s infinite linear;
}
@keyframes twinkle {
  0%,100% {opacity: 0.8;}
  50% {opacity: 0.3;}
}

/* 📱 Extra small devices */
@media (max-width: 400px) {
  .container {
    padding: 20px;
  }

  input, button {
    padding: 10px;
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h2>📊 Attendance Calculator</h2>

  <input type="number" id="total" placeholder="Total Lectures">
  <input type="number" id="attended" placeholder="Lectures Attended">
  <input type="number" id="required" placeholder="Required % (75)">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>
</div>

<script>
function calculate() {

  var T = Number(document.getElementById("total").value);
  var A = Number(document.getElementById("attended").value);
  var P = Number(document.getElementById("required").value);

  var result = document.getElementById("result");

  if (T <= 0 || A < 0 || P <= 0) {
    result.innerHTML = "⚠️ Enter valid values!";
    return;
  }

  var current = (A / T) * 100;
  var message = "";

  if (current >= P) {
    message = "😎 You are safe!";
  } else {

    // Max possible attendance if you attend all remaining classes
    var maxPossible = ((A + (T - A)) / (T + (T - A))) * 100;

    if (maxPossible < P) {
      message = "😔 You can't reach the required attendance. Better luck next time!";
    } else {
      var extra = 0;

      while ((A / T) * 100 < P) {
        A++;
        T++;
        extra++;
      }

      message = "📚 Attend " + extra + " more lectures.";
    }
  }

  result.innerHTML =
    "Current: " + current.toFixed(2) + "%<br>" + message;
}
</script>

</body>
</html>
